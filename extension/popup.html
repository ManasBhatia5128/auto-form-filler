<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Auto-Filler</title>
  <style>
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      color: #111827;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background-color: #2563eb;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:active {
      background-color: #1e40af;
    }
    #status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <h2>Semantic Auto-Filler</h2>
  <button id="fillFormBtn">Fill Form</button>
  <div id="status">Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
